<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Travel AI</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'IBM Plex Sans KR', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        
        /* Pastel Theme Buttons & Elements */
        .btn-rose { background-color: #FFE4E6; color: #E11D48; }
        .btn-rose:active { background-color: #FECDD3; }
        
        .btn-blue { background-color: #DBEAFE; color: #2563EB; }
        .btn-blue:active { background-color: #BFDBFE; }
        
        .btn-amber { background-color: #FEF3C7; color: #D97706; }
        .btn-amber:active { background-color: #FDE68A; }
        
        .btn-emerald { background-color: #D1FAE5; color: #059669; }
        .btn-emerald:active { background-color: #A7F3D0; }

        .btn-dark { background-color: #1E293B; color: #FFFFFF; }
        .btn-dark:active { background-color: #0F172A; }

        /* Output Styling: Replace Markdown Bold with Custom Style */
        .output-content b {
            color: #4F46E5;
            background-color: #EEF2FF;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 700;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .card { background: white; border-radius: 2.5rem; border: 1px solid #F1F5F9; transition: transform 0.2s; }
        .card:active { transform: scale(0.99); }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-5">
            <div class="max-w-xl mx-auto flex items-center gap-3">
                <div class="bg-indigo-500 p-2.5 rounded-2xl shadow-lg shadow-indigo-100">
                    <i data-lucide="plane" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">JapanTravel <span class="text-indigo-500">AI</span></h1>
            </div>
        </header>

        <main class="flex-grow max-w-xl mx-auto w-full px-5 py-8 space-y-6">
            
            <!-- 1. Exchange Rate Card -->
            <section class="card p-8 space-y-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="bg-rose-50 p-3 rounded-2xl"><i data-lucide="coins" class="text-rose-500 w-6 h-6"></i></div>
                        <h2 class="font-bold text-lg text-slate-900">실시간 환율</h2>
                    </div>
                    <button onclick="fetchRate()" class="p-3 bg-slate-50 rounded-full active:bg-slate-100 transition-colors">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>

                <div class="text-center py-6 bg-rose-50/50 rounded-3xl border border-rose-100/30">
                    <div id="rate-display" class="text-3xl font-extrabold text-slate-900 tracking-tighter">100 JPY = -- KRW</div>
                    <p class="text-xs text-rose-400 mt-2 font-bold">참고용으로 확인 바랍니다</p>
                </div>

                <div class="space-y-3">
                    <div class="relative">
                        <input type="text" id="input-krw" oninput="handleConvert('KRW')" placeholder="원 (KRW) 입력" class="w-full h-20 pl-6 pr-20 bg-slate-50 border-none rounded-3xl text-xl font-bold focus:ring-2 focus:ring-rose-200 outline-none transition-all">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-sm font-black text-slate-300">KRW</span>
                    </div>
                    <div class="flex justify-center -my-4 z-10 relative">
                        <div class="bg-white p-3 rounded-full border border-slate-100 shadow-sm text-slate-300">
                            <i data-lucide="arrow-down-up" class="w-5 h-5"></i>
                        </div>
                    </div>
                    <div class="relative">
                        <input type="text" id="input-jpy" oninput="handleConvert('JPY')" placeholder="엔 (JPY) 입력" class="w-full h-20 pl-6 pr-20 bg-slate-50 border-none rounded-3xl text-xl font-bold focus:ring-2 focus:ring-rose-200 outline-none transition-all">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-sm font-black text-slate-300">JPY</span>
                    </div>
                </div>
            </section>

            <!-- 2. Weather Redirect Card -->
            <section class="card p-8 bg-blue-50/50 border-blue-100/50">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-white p-3 rounded-2xl shadow-sm"><i data-lucide="cloud-sun" class="text-blue-500 w-6 h-6"></i></div>
                    <h2 class="font-bold text-lg text-slate-900">현지 날씨 확인</h2>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input id="weather-city" type="text" placeholder="도시 입력 (예: 도쿄)" class="flex-grow h-16 px-6 bg-white border border-blue-100 rounded-2xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-200">
                    <button onclick="goWeather()" class="btn-blue h-16 px-8 rounded-2xl font-bold text-base transition-all">이동하기</button>
                </div>
            </section>

            <!-- 3. AI Itinerary Planner -->
            <section class="card p-8">
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-amber-50 p-3 rounded-2xl"><i data-lucide="map" class="text-amber-500 w-6 h-6"></i></div>
                    <h2 class="font-bold text-lg text-slate-900">AI 맞춤 일정</h2>
                </div>
                <div class="space-y-4">
                    <textarea id="plan-query" placeholder="예: 도쿄 3박 4일 자연 위주 일정 추천" class="w-full h-40 p-6 bg-slate-50 border-none rounded-[2rem] text-base font-medium focus:ring-2 focus:ring-amber-200 outline-none resize-none leading-relaxed"></textarea>
                    <button onclick="createPlan()" id="plan-btn" class="w-full py-5 btn-amber rounded-2xl font-bold text-lg transition-all shadow-md">일정 생성하기</button>
                </div>
                <div id="plan-box" class="hidden mt-6 bg-slate-50 p-8 rounded-[2rem] text-[15px] leading-loose whitespace-pre-wrap text-slate-700 output-content"></div>
            </section>

            <!-- 4. Natural Translator -->
            <section class="card p-8">
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-emerald-50 p-3 rounded-2xl"><i data-lucide="languages" class="text-emerald-500 w-6 h-6"></i></div>
                    <h2 class="font-bold text-lg text-slate-900">자연스러운 번역</h2>
                </div>
                <div class="space-y-4">
                    <textarea id="trans-query" placeholder="일본어로 바꾸고 싶은 말을 입력하세요." class="w-full h-40 p-6 bg-slate-50 border-none rounded-[2rem] text-base font-medium focus:ring-2 focus:ring-emerald-200 outline-none resize-none leading-relaxed"></textarea>
                    <button onclick="runTranslate()" id="trans-btn" class="w-full py-5 btn-emerald rounded-2xl font-bold text-lg transition-all shadow-md">번역하기</button>
                </div>
                <div id="trans-box" class="hidden mt-6 bg-slate-50 p-8 rounded-[2rem] text-[15px] leading-loose whitespace-pre-wrap text-slate-700 output-content"></div>
            </section>

        </main>

        <footer class="py-12 text-center text-slate-300 font-bold text-[10px] tracking-[0.3em] uppercase">
            Japan Travel AI · 2026
        </footer>
    </div>

    <script>
        lucide.createIcons();

        let currentRate = 0;

        function formatNumber(num) {
            if (!num) return "";
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function unformatNumber(str) {
            return str.replace(/,/g, "");
        }

        async function fetchRate() {
            try {
                const res = await fetch('https://api.frankfurter.app/latest?from=KRW&to=JPY');
                const data = await res.json();
                currentRate = data.rates.JPY;
                const jpy100ToKrw = (1 / currentRate) * 100;
                document.getElementById('rate-display').innerText = `100 JPY = ${formatNumber(jpy100ToKrw.toFixed(2))} KRW`;
            } catch (e) { console.error(e); }
        }
        fetchRate();

        function handleConvert(type) {
            if (!currentRate) return;
            const krwInput = document.getElementById('input-krw');
            const jpyInput = document.getElementById('input-jpy');

            if (type === 'KRW') {
                const rawVal = unformatNumber(krwInput.value);
                if (isNaN(parseFloat(rawVal))) { jpyInput.value = ''; krwInput.value = ''; return; }
                krwInput.value = formatNumber(rawVal);
                jpyInput.value = formatNumber((parseFloat(rawVal) * currentRate).toFixed(0));
            } else {
                const rawVal = unformatNumber(jpyInput.value);
                if (isNaN(parseFloat(rawVal))) { krwInput.value = ''; jpyInput.value = ''; return; }
                jpyInput.value = formatNumber(rawVal);
                krwInput.value = formatNumber((parseFloat(rawVal) / currentRate).toFixed(0));
            }
        }

        function goWeather() {
            const city = document.getElementById('weather-city').value;
            if (!city) return;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(city + ' 날씨')}`, '_blank');
        }

        async function callGemini(prompt, useSearch = false) {
            const res = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, useSearch })
            });
            return await res.json();
        }

        async function createPlan() {
            const query = document.getElementById('plan-query').value;
            const btn = document.getElementById('plan-btn');
            const box = document.getElementById('plan-box');
            if(!query) return;

            btn.disabled = true; btn.innerText = "정보를 찾는 중...";
            box.classList.add('hidden');

            // System prompt instructions to avoid markdown characters and use tags instead
            const prompt = `${query}\n\n[작성 규칙]\n1. 마크다운 기호(###, **, - 등)를 절대 사용하지 마세요.\n2. 강조가 필요한 핵심 단어나 장소명은 반드시 <b>강조내용</b> 형식으로 감싸주세요.\n3. 줄바꿈을 적절히 사용하여 읽기 편하게 작성하세요.\n4. 구글 검색을 통해 현재 가장 인기 있는 정보를 반영하세요.`;

            try {
                const res = await callGemini(prompt, true);
                box.innerHTML = res.text.replace(/\n/g, '<br>');
                box.classList.remove('hidden');
            } catch(e) { box.innerText = "오류가 발생했습니다."; box.classList.remove('hidden'); }
            finally { btn.disabled = false; btn.innerText = "일정 생성하기"; }
        }

        async function runTranslate() {
            const query = document.getElementById('trans-query').value;
            const btn = document.getElementById('trans-btn');
            const box = document.getElementById('trans-box');
            if(!query) return;

            btn.disabled = true; btn.innerText = "번역 중...";
            box.classList.add('hidden');

            const prompt = `"${query}"를 일본인이 들었을 때 가장 자연스러운 표현으로 번역해줘.\n\n[작성 규칙]\n1. 마크다운 기호(###, **)를 절대 사용하지 마세요.\n2. 번역된 일본어 문장은 <b>일본어문장</b> 형식으로 강조하세요.\n3. 한글 발음과 상황 팁을 포함하세요.`;

            try {
                const res = await callGemini(prompt, false);
                box.innerHTML = res.text.replace(/\n/g, '<br>');
                box.classList.remove('hidden');
            } catch(e) { box.innerText = "오류가 발생했습니다."; box.classList.remove('hidden'); }
            finally { btn.disabled = false; btn.innerText = "번역하기"; }
        }
    </script>
</body>
</html>
